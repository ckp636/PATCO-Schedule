name: Daily Schedule Refresh

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 02:00 ET daily
  workflow_dispatch:        # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push updated data/public/schedule.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        run: python pipeline/main.py
        working-directory: ${{ github.workspace }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_CS614 }}

      - name: Commit updated schedule (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/public/schedule.json data/audit/.last_digest
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh schedule $(date -u +%Y-%m-%d)"
            git push
          fi
# end of workflow
